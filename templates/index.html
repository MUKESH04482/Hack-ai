<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>InsightAI - Research Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #38bdf8;
      margin-bottom: 5px;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 30px;
    }

    .input-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      outline: none;
    }

    button {
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      color: #0f172a;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #0ea5e9;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      animation: fadeIn 0.5s ease-in-out;
    }

    .card h3 {
      margin-top: 0;
      color: #38bdf8;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .loader {
      text-align: center;
      margin: 20px;
      display: none;
    }

    .loader::after {
      content: "";
      width: 30px;
      height: 30px;
      border: 4px solid #38bdf8;
      border-top: 4px solid transparent;
      border-radius: 50%;
      display: inline-block;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .error {
      color: #ef4444;
      text-align: center;
    }

    @media (max-width: 600px) {
      .input-box {
        flex-direction: column;
      }
    }
  </style></head><body><div class="container">
  <h1>InsightAI</h1>
  <div class="subtitle">AI Research Assistant</div>  <div class="input-box">
    <input id="query" type="text" placeholder="Ask a research question...">
    <button onclick="analyze()">Analyze</button>
  </div>  <div class="loader" id="loader"></div>  <div id="output"></div>
</div><script>
async function analyze() {
  const query = document.getElementById("query").value;
  const output = document.getElementById("output");
  const loader = document.getElementById("loader");

  if (!query) return;

  output.innerHTML = "";
  loader.style.display = "block";

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: query   // ✅ matches backend
      })
    });

    const data = await res.json();

    loader.style.display = "none";

    const fullText = data.response || "No response received";

    renderCard("📌 Direct Answer", fullText);
    renderCard("💡 Key Insights", fullText);
    renderCard("🔍 Deep Analysis", fullText);
    renderCard("✅ Practical Takeaways", fullText);

  } catch (err) {
    loader.style.display = "none";
    output.innerHTML = "<p class='error'>Error connecting to server</p>";
  }
}

function renderCard(title, content) {
  const output = document.getElementById("output");

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <h3>${title}</h3>
    <p>${content}</p>
  `;

  output.appendChild(card);
}
</script></body>
</html>
