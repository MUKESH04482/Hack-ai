services:
  - type: web
    name: adk-gemini-agent
    runtime: python
    buildCommand: pip install --no-cache-dir --prefer-binary -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
    healthCheckPath: /
    autoDeploy: true